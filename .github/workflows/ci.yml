name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run check
      - run: npm run scorecard:example
      - run: npm run proposal:example
      - run: npm run security:example
      - run: npm run security:medium-risk-example
      - run: npm run security:non-prompt-example
